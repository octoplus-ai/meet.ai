<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OctoMeet AI — Meet Add-on</title>
  <script src="https://www.gstatic.com/meetjs/addons/1.1.0/meet.addons.js"></script>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif; background: #14122e; color: #fff; overflow: hidden; }
    /* faded logo watermark behind everything */
    .bg { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 0; pointer-events: none; }
    .bg svg { width: 92%; max-width: 380px; opacity: 0.07; }
    .wrap { position: relative; z-index: 1; display: flex; flex-direction: column; min-height: 100vh; padding: 18px 16px; }
    .brand { display: flex; align-items: center; gap: 10px; }
    .brand h1 { font-size: 16px; font-weight: 800; margin: 0; }
    .sub { font-size: 12px; color: #b9a9e6; margin-top: 2px; }
    .card { margin-top: 16px; background: rgba(124,58,237,.12); border: 1px solid rgba(168,85,247,.25); border-radius: 16px; padding: 16px; backdrop-filter: blur(4px); }
    .status { display: flex; align-items: center; gap: 8px; font-size: 13px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: #64748b; }
    .dot.rec { background: #f43f5e; animation: pulse 1.4s infinite; }
    @keyframes pulse { 0% { box-shadow: 0 0 0 0 rgba(244,63,94,.6);} 70% { box-shadow: 0 0 0 8px rgba(244,63,94,0);} 100%{ box-shadow:0 0 0 0 rgba(244,63,94,0);} }
    button { width: 100%; border: 0; border-radius: 12px; padding: 13px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 14px; }
    .start { background: #7c3aed; color: #fff; } .start:hover { background: #6d28d9; }
    .stop { background: #f43f5e; color: #fff; }
    .feat { font-size: 12px; color: #cbb9f0; margin-top: 8px; }
    .feat span { display: inline-block; margin-right: 8px; }
    .muted { font-size: 11px; color: #8b80b0; margin-top: 14px; line-height: 1.5; }
    a { color: #c084fc; }
  </style>
</head>
<body>
  <div class="bg">
    <svg viewBox="0 0 64 64" aria-hidden>
      <defs><linearGradient id="bgg" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#C084FC"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient></defs>
      <path d="M44 19 L58 12 Q61 10.5 61 14.5 V37.5 Q61 41.5 58 40 L44 33 Z" fill="url(#bgg)"/>
      <path d="M10 27 C10 16 19 8 28 8 C37 8 46 16 46 27 L46 40 Q43.5 46 41 46 Q38.5 46 36.5 40 Q34 46 32 46 Q29.5 46 27.5 40 Q25 46 23 46 Q20.5 46 18.5 40 Q16 46 14 46 Q11 46 10 40 Z" fill="url(#bgg)"/>
      <rect x="25" y="16" width="6" height="20" rx="3" fill="#fff"/><rect x="18" y="23" width="20" height="6" rx="3" fill="#fff"/>
    </svg>
  </div>

  <div class="wrap">
    <div class="brand">
      <svg width="30" height="30" viewBox="0 0 64 64" aria-hidden>
        <defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#C084FC"/><stop offset="100%" stop-color="#7C3AED"/></linearGradient></defs>
        <path d="M44 19 L58 12 Q61 10.5 61 14.5 V37.5 Q61 41.5 58 40 L44 33 Z" fill="url(#g)"/>
        <path d="M10 27 C10 16 19 8 28 8 C37 8 46 16 46 27 L46 40 Q43.5 46 41 46 Q38.5 46 36.5 40 Q34 46 32 46 Q29.5 46 27.5 40 Q25 46 23 46 Q20.5 46 18.5 40 Q16 46 14 46 Q11 46 10 40 Z" fill="url(#g)"/>
        <rect x="25" y="16" width="6" height="20" rx="3" fill="#fff"/><rect x="18" y="23" width="20" height="6" rx="3" fill="#fff"/>
      </svg>
      <div><h1>OctoMeet AI</h1><div class="sub">AI Notetaker</div></div>
    </div>

    <div class="card">
      <div class="status"><span class="dot" id="dot"></span><span id="statusText">Ready to record</span></div>
      <div class="feat"><span>✦ Transcript</span><span>✦ Summary</span><span>✦ Action items</span><span>✦ Scores</span></div>
      <button class="start" id="startBtn">● Start recording</button>
      <button class="stop" id="stopBtn" style="display:none">■ Stop recording</button>
    </div>

    <div class="muted" id="ctx">Connecting to this meeting…</div>
    <div style="flex:1"></div>
    <div class="muted">OctoMeet joins, records &amp; transcribes this call, then generates the full AI report. Reports: <a href="https://meet-ai-three-beige.vercel.app/" target="_blank" rel="noopener">open OctoMeet</a>.</div>
  </div>

  <script>
    const CLOUD_PROJECT_NUMBER = "540014435995";
    const APP = "https://meet.octoplusteam.com";
    // The OAuth popup can land on either domain (the Google redirect_uri is fixed) - accept both.
    const ORIGINS = [APP, "https://meet-ai-three-beige.vercel.app"];
    const TOK_KEY = "octomeet_addon_token";
    const $ = (id) => document.getElementById(id);
    let meetingUrl = null, meetingCode = null;

    function setRecording(on, text) {
      $("dot").className = "dot" + (on ? " rec" : "");
      $("statusText").textContent = text || (on ? "Recording…" : "Ready to record");
      $("startBtn").style.display = on ? "none" : "block";
      $("stopBtn").style.display = on ? "block" : "none";
    }

    async function init() {
      try {
        const session = await window.meet.addon.createAddonSession({ cloudProjectNumber: CLOUD_PROJECT_NUMBER });
        const sidePanel = await session.createSidePanelClient();
        const info = await sidePanel.getMeetingInfo();
        // meetingCode is sometimes absent - meetingId carries the same code in those builds.
        const raw = info && (info.meetingCode || info.meetingId);
        meetingCode = raw ? String(raw).replace(/^https?:\/\/meet\.google\.com\//, "") : null;
        meetingUrl = meetingCode ? ("https://meet.google.com/" + meetingCode) : null;
        $("ctx").textContent = meetingUrl ? "Connected to this meeting ✓" : "Open this from inside a Meet call.";
      } catch (e) {
        $("ctx").textContent = "Loaded.";
        console.error("addon init error", e);
      }
    }

    // Sign-in popup → returns a session token the add-on can use (cookies are blocked in the iframe).
    function authPopup() {
      return new Promise((resolve, reject) => {
        const w = window.open(APP + "/api/auth/google/start?addon=1", "octoauth", "width=480,height=660,menubar=no,toolbar=no");
        let done = false;
        function onMsg(e) {
          if (!ORIGINS.includes(e.origin)) return;
          if (e.data && e.data.type === "octomeet-token" && e.data.token) {
            done = true; window.removeEventListener("message", onMsg);
            try { w && w.close(); } catch (_) {}
            localStorage.setItem(TOK_KEY, e.data.token);
            resolve(e.data.token);
          }
        }
        window.addEventListener("message", onMsg);
        const iv = setInterval(() => {
          if (w && w.closed && !done) { clearInterval(iv); window.removeEventListener("message", onMsg); reject(new Error("cancelled")); }
        }, 500);
      });
    }
    async function ensureToken(force) {
      const tk = force ? null : localStorage.getItem(TOK_KEY);
      if (tk) return tk;
      return await authPopup();
    }
    // ---- Bot path (fallback): a Recall notetaker joins + records.
    function callBotStart(tk) {
      return fetch(APP + "/api/recall/start-bot", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": "Bearer " + tk },
        body: JSON.stringify({ meetingUrl: meetingUrl, title: "Live meeting", botName: "OctoMeet AI" }),
      });
    }

    // ---- Botless path (Meet Media API): OctoMeet captures the call audio directly - NO bot
    // joins. Google shows its native "media collection" consent to the participants, exactly
    // like Read.ai. The received tracks are mixed and recorded IN THIS PANEL, then shipped to
    // the orchestrator for diarized transcription (browsers hold no ASR key).
    let pc = null, audioTracks = [], recorder = null, chunks = [], recStartedAt = 0, mode = null, audioCtx = null;
    async function startBotless(tk) {
      const gt = await fetch(APP + "/api/media/google-token", { headers: { Authorization: "Bearer " + tk } }).then((r) => r.json()).catch(() => ({}));
      if (!gt.access_token) throw new Error("reconnect");                    // needs re-login w/ Media scopes
      const at = gt.access_token;
      const sp = await fetch("https://meet.googleapis.com/v2/spaces/" + meetingCode, { headers: { Authorization: "Bearer " + at } });
      const spd = await sp.json().catch(() => ({}));
      if (!sp.ok || !spd.name) throw new Error("space:" + ((spd.error && spd.error.message) || sp.status));
      const spaceId = spd.name.split("/")[1];

      pc = new RTCPeerConnection();
      pc.addTransceiver("audio", { direction: "recvonly" });
      pc.addTransceiver("audio", { direction: "recvonly" });
      pc.addTransceiver("audio", { direction: "recvonly" });
      pc.createDataChannel("session-control");
      pc.createDataChannel("media-stats");
      audioTracks = [];
      pc.ontrack = (ev) => { if (ev.track && ev.track.kind === "audio") { audioTracks.push(ev.track); wireTrack(ev.track); } };
      const offer = await pc.createOffer({ offerToReceiveAudio: true });
      await pc.setLocalDescription(offer);

      const r = await fetch("https://meet.googleapis.com/v2beta/spaces/" + spaceId + ":connectActiveConference", {
        method: "POST", headers: { Authorization: "Bearer " + at, "Content-Type": "application/json" },
        body: JSON.stringify({ offer: pc.localDescription.sdp }),
      });
      const ans = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error("connect:" + ((ans.error && ans.error.message) || JSON.stringify(ans).slice(0, 100)));
      await pc.setRemoteDescription({ type: "answer", sdp: ans.answer });

      // Mix every inbound audio track into ONE stream and record it (opus/webm, 15s slices).
      audioCtx = new AudioContext();
      const dest = audioCtx.createMediaStreamDestination();
      window.__octoMixDest = dest; // wireTrack needs it for tracks that arrive later
      audioTracks.forEach(wireTrack);
      chunks = [];
      recorder = new MediaRecorder(dest.stream, { mimeType: "audio/webm;codecs=opus", audioBitsPerSecond: 48000 });
      recorder.ondataavailable = (e) => { if (e.data && e.data.size) chunks.push(e.data); };
      recorder.start(15000);
      recStartedAt = Date.now();
      return true; // Google now shows the native consent dialog + persistent sharing banner - no participant joins.
    }
    const wired = new WeakSet();
    function wireTrack(track) {
      const dest = window.__octoMixDest;
      if (!dest || !audioCtx || wired.has(track)) return;
      wired.add(track);
      try { audioCtx.createMediaStreamSource(new MediaStream([track])).connect(dest); } catch (e) { console.warn("wire track", e); }
    }

    // Retry-safe stop: the captured audio is the ONLY copy, so every step caches its result
    // (blob, finish pass) and a failed attempt leaves mode='botless' - clicking Stop again
    // retries only what's missing instead of losing the meeting.
    let pendingBlob = null, pendingFin = null;
    async function stopBotless() {
      if (!pendingBlob) {
        if (recorder && recorder.state !== "inactive") {
          pendingBlob = await new Promise((resolve) => {
            recorder.onstop = () => resolve(new Blob(chunks, { type: "audio/webm" }));
            try { recorder.stop(); } catch (_) { resolve(new Blob(chunks, { type: "audio/webm" })); }
          });
        } else pendingBlob = new Blob(chunks, { type: "audio/webm" });
        try { if (pc) pc.close(); } catch (_) {}
        try { if (audioCtx) audioCtx.close(); } catch (_) {}
      }
      if (!pendingBlob.size) throw new Error("no audio captured");
      // 1) Register the meeting -> get the one-shot upload pass (the audio can't go through
      //    Vercel: ~4.5MB body cap). Re-auth once on 401. Cached so a retry never creates a
      //    second meetings row.
      if (!pendingFin) {
        const durationMin = Math.max(1, Math.round((Date.now() - recStartedAt) / 60000));
        const finBody = JSON.stringify({ meetingCode, title: meetingCode ? "Meet " + meetingCode : "Live meeting", durationMin });
        let tk = await ensureToken(false);
        let fr = await fetch(APP + "/api/media/finish", { method: "POST", headers: { "Content-Type": "application/json", Authorization: "Bearer " + tk }, body: finBody });
        if (fr.status === 401) { localStorage.removeItem(TOK_KEY); tk = await ensureToken(true); fr = await fetch(APP + "/api/media/finish", { method: "POST", headers: { "Content-Type": "application/json", Authorization: "Bearer " + tk }, body: finBody }); }
        const fin = await fr.json().catch(() => ({}));
        if (!fin.ok || !fin.uploadUrl) throw new Error(fin.error || "finish failed");
        pendingFin = fin;
      }
      // 2) POST the blob straight to the orchestrator.
      const up = await fetch(pendingFin.uploadUrl, {
        method: "POST",
        headers: { "Content-Type": "audio/webm", "x-octomeet-meeting": pendingFin.meetingId, "x-octomeet-pass": pendingFin.pass },
        body: pendingBlob,
      });
      if (!up.ok) throw new Error("upload " + up.status);
      const id = pendingFin.meetingId;
      pendingBlob = null; pendingFin = null; chunks = [];
      return id;
    }

    // Start: botless FIRST (Read.ai-style native capture); if Google gates the Media API for
    // this account/project (developer preview) or anything fails, fall back to sending the bot.
    $("startBtn").onclick = async () => {
      if (!meetingUrl) { $("ctx").textContent = "Open this from inside a Google Meet call."; return; }
      if (pendingBlob || pendingFin) { setRecording(true, "Upload pending - click Stop to retry"); return; } // never wipe an undelivered capture
      setRecording(true, "Starting…");
      let tk;
      try { tk = await ensureToken(false); } catch (_) { setRecording(false); return; }
      try {
        await startBotless(tk);
        mode = "botless";
        setRecording(true, "Recording (botless) 🔴");
        $("ctx").textContent = "Participants see Google's sharing banner. Stop to generate the report.";
        return;
      } catch (e) {
        console.warn("botless unavailable -> bot fallback:", e && e.message);
        if (String(e && e.message) === "reconnect") $("ctx").textContent = "Re-login needed for botless - sending the notetaker instead.";
      }
      try {
        let r = await callBotStart(tk);
        if (r.status === 401) { localStorage.removeItem(TOK_KEY); tk = await ensureToken(true); r = await callBotStart(tk); }
        const d = await r.json().catch(() => ({}));
        if (r.ok) { mode = "bot"; setRecording(true, "OctoMeet is joining 🔴 - admit it when it knocks"); $("ctx").textContent = "The notetaker will ask to join in ~30-60s."; }
        else setRecording(false, "Couldn't start" + (d && d.error ? ": " + String(d.error).slice(0, 60) : ""));
      } catch (e2) { setRecording(false, "Couldn't start - try again"); }
    };
    $("stopBtn").onclick = async () => {
      if (mode === "botless") {
        setRecording(true, "Uploading & processing…");
        try {
          await stopBotless();
          mode = null;
          setRecording(false, "Report is being generated ✓");
          $("ctx").textContent = "The report (summary, transcript, scores) will appear in OctoMeet in a few minutes.";
        } catch (e) {
          // Keep mode='botless': the blob/pass are cached, so Stop can be clicked again to
          // retry the upload - failing here must never discard the only copy of the audio.
          setRecording(true, "Upload failed - click Stop to retry");
          $("ctx").textContent = String(e && e.message).slice(0, 80);
        }
        return;
      }
      if (mode === "bot") {
        setRecording(false, "Stopping the notetaker…");
        try {
          const tk = await ensureToken(false);
          await fetch(APP + "/api/bot/stop", { method: "POST", headers: { "Content-Type": "application/json", Authorization: "Bearer " + tk }, body: JSON.stringify({ meetingUrl }) });
          setRecording(false, "Notetaker stopped");
        } catch (e) { setRecording(false, "Couldn't stop - remove the bot from the call"); }
      } else {
        try { if (pc) pc.close(); } catch (_) {}
        setRecording(false, "Recording stopped");
      }
      mode = null;
    };

    if (document.readyState === "loading") document.addEventListener("DOMContentLoaded", init);
    else init();
  </script>
</body>
</html>
